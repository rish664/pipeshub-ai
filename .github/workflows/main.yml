name: PR Validations

on:
  pull_request:
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/nodejs/apps/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend/nodejs/apps
          npm install

      - name: Lint backend (changed files)
        run: |
          git fetch origin main
          MERGE_BASE=$(git merge-base origin/main HEAD)
          CHANGED_FILES=$(git diff --name-only $MERGE_BASE -- 'backend/nodejs/apps/src/**/*.ts' || true)
          if [ -n "$CHANGED_FILES" ]; then
            echo "Linting changed TypeScript files:"
            echo "$CHANGED_FILES"
            RELATIVE_FILES=$(echo "$CHANGED_FILES" | sed 's|^backend/nodejs/apps/||')
            cd backend/nodejs/apps
            echo "$RELATIVE_FILES" | xargs npx eslint
          else
            echo "No TypeScript files changed in backend, skipping ESLint."
          fi

      - name: Build backend
        run: |
          cd backend/nodejs/apps
          npm run build

      # - name: Run backend tests
      #   run: |
      #     cd backend/nodejs/apps
      #     npm test

  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  ruff-lint-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ruff
        run: pip install ruff

      - name: Run all ruff rules on changed Python files
        run: |
          git fetch origin main
          MERGE_BASE=$(git merge-base origin/main HEAD)
          CHANGED_FILES=$(git diff --diff-filter=d --name-only $MERGE_BASE -- '*.py' || true)
          if [ -n "$CHANGED_FILES" ]; then
            echo "Linting changed Python files with full ruleset:"
            echo "$CHANGED_FILES"
            echo "$CHANGED_FILES" | xargs ruff check
          else
            echo "No Python files changed, skipping ruff."
          fi

  pyright-type-check-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd backend/python
          pip install pyright
          pip install -e . 2>&1 || true

      - name: Run pyright on changed Python files
        run: |
          git fetch origin main
          MERGE_BASE=$(git merge-base origin/main HEAD)
          CHANGED_FILES=$(git diff --diff-filter=d --name-only $MERGE_BASE -- 'backend/python/**/*.py' | grep -v 'code-generator/' | grep -v 'example\.py$' | sed 's|^backend/python/||' || true)
          if [ -n "$CHANGED_FILES" ]; then
            echo "Type-checking changed Python files:"
            echo "$CHANGED_FILES"
            cd backend/python
            echo "$CHANGED_FILES" | xargs pyright
          else
            echo "No Python files changed in backend/python, skipping pyright."
          fi
