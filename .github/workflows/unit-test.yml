name: unit-test

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'backend/nodejs/apps/src/**'
      - 'backend/nodejs/apps/tests/**'
      - 'backend/nodejs/apps/package.json'
      - 'backend/nodejs/apps/package-lock.json'
      - 'backend/nodejs/apps/tsconfig*.json'
      - 'backend/nodejs/apps/.mocharc.yaml'
      - 'backend/nodejs/apps/.c8rc.json'
      - 'backend/python/app/**'
      - 'backend/python/tests/**'
      - 'backend/python/pyproject.toml'
      - 'backend/python/pytest.ini'
      - 'backend/python/.coveragerc'

permissions:
  contents: read

jobs:
  nodejs-unit-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/nodejs/apps/package-lock.json

      - name: Install dependencies
        run: |
          cd backend/nodejs/apps
          npm ci

      - name: Run unit tests with coverage
        run: |
          cd backend/nodejs/apps
          npm run test:ci

  python-unit-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmariadb-dev

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          cd backend/python
          uv pip install --system pytest pytest-asyncio pytest-timeout coverage
          uv pip install --system -e .

      - name: Run unit tests with coverage
        run: |
          cd backend/python
          coverage run -m pytest tests/unit -v
          coverage report --fail-under=90
