{{- if .Values.neo4j.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pipeshub-ai.fullname" . }}-neo4j
  labels:
    {{- include "pipeshub-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "pipeshub-ai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: neo4j
  template:
    metadata:
      labels:
        {{- include "pipeshub-ai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: neo4j
    spec:
      securityContext:
        {{- toYaml .Values.neo4j.podSecurityContext | nindent 8 }}
      containers:
        - name: neo4j
          image: "{{ .Values.neo4j.image.repository }}:{{ .Values.neo4j.image.tag }}"
          imagePullPolicy: {{ .Values.neo4j.image.pullPolicy }}
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.fullname" . }}-secrets
                  key: neo4j-auth
            {{- range $k, $v := .Values.neo4j.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
            - name: neo4j-logs
              mountPath: /logs
          resources:
            {{- toYaml .Values.neo4j.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.neo4j.securityContext | nindent 12 }}
      volumes:
        - name: neo4j-data
        {{- if .Values.neo4j.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "pipeshub-ai.fullname" . }}-neo4j-data
        {{- else }}
          emptyDir: {}
        {{- end }}
        - name: neo4j-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pipeshub-ai.fullname" . }}-neo4j
  labels:
    {{- include "pipeshub-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  type: ClusterIP
  ports:
    - port: 7687
      targetPort: bolt
      protocol: TCP
      name: bolt
    - port: 7474
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "pipeshub-ai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
---
{{- if .Values.neo4j.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "pipeshub-ai.fullname" . }}-neo4j-data
  labels:
    {{- include "pipeshub-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  accessModes:
    {{- toYaml .Values.neo4j.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.neo4j.persistence.size }}
  {{- if .Values.neo4j.persistence.storageClass }}
  storageClassName: {{ .Values.neo4j.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
{{- end }}
